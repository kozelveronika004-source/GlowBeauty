<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowBeauty - Catalog</title>
<link rel="stylesheet" href="style.css">
<style>
/* Сетка карточек на странице Catalog */
#catalog-products {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* три столбца */
  gap: 20px; /* расстояние между карточками */
}

/* Адаптивность для планшетов и телефонов */
@media (max-width: 1024px) {
  #catalog-products {
    grid-template-columns: repeat(2, 1fr); /* два столбца */
  }
}

@media (max-width: 768px) {
  #catalog-products {
    grid-template-columns: 1fr; /* один столбец на мобильных */
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">GlowBeauty</div>
  <nav class="nav-center">
    <a href="index.html">Home</a>
    <a href="catalog.html" class="active">Catalog</a>
    <a href="checkout.html">Checkout</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-wrapper">
    <a href="cart.html" class="cart-icon">🛒<span id="cart-counter">0</span></a>
  </div>
</header>

<main class="container">


  <div class="catalog-wrapper" style="display:flex; gap:20px;">
    
    <!-- Фильтры слева -->
    <aside class="filters" style="flex:1; max-width:250px;">
      <h3>Filter by Category</h3>
      <label><input type="checkbox" value="Skincare" class="filter-checkbox"> Skincare</label><br>
      <label><input type="checkbox" value="Makeup" class="filter-checkbox"> Makeup</label>

      <h3>Filter by Brand</h3>
      <label><input type="checkbox" value="GlowBeauty" class="filter-checkbox"> GlowBeauty</label><br>
      <label><input type="checkbox" value="PureSkin" class="filter-checkbox"> PureSkin</label><br>
      <label><input type="checkbox" value="LuxeCos" class="filter-checkbox"> LuxeCos</label>

      <h3>Filter by Price</h3>
      <label><input type="checkbox" value="10-20" class="filter-checkbox">$10–$20</label><br>
      <label><input type="checkbox" value="21-50" class="filter-checkbox">$21–$50</label>

      <!-- Кнопки фильтра -->
      <div style="margin-top:15px; display:flex; gap:10px;">
        <button id="apply-filters" style="flex:1; padding:8px 10px; background-color:#ff66b2; color:white; border:none; border-radius:5px; cursor:pointer;">Apply Filters</button>
        <button id="clear-filters" style="flex:1; padding:8px 10px; background-color:#ccc; color:#333; border:none; border-radius:5px; cursor:pointer;">Clear Filters</button>
      </div>
    </aside>

    <!-- Сетка товаров -->
    <div class="flex" id="catalog-products" style="flex:3;"></div>

  </div>

</main>

<footer>
  <p>Contact: info@glowbeauty.com | Follow us on social media</p>
  <p>© 2026 GlowBeauty</p>
</footer>

<script>
// Массив товаров каталога (10 товаров)
const products = [
  {id:1,name:"Hydrating Face Cream",price:25, category:"Skincare", brand:"GlowBeauty"},
  {id:2,name:"Vitamin C Serum",price:30, category:"Skincare", brand:"PureSkin"},
  {id:3,name:"Matte Lipstick",price:15, category:"Makeup", brand:"GlowBeauty"},
  {id:4,name:"Eyeliner Pen",price:12, category:"Makeup", brand:"LuxeCos"},
  {id:5,name:"Night Repair Cream",price:28, category:"Skincare", brand:"GlowBeauty"},
  {id:6,name:"Face Mask Set",price:20, category:"Skincare", brand:"PureSkin"},
  {id:7,name:"Blush Powder",price:18, category:"Makeup", brand:"LuxeCos"},
  {id:8,name:"Lip Gloss Set",price:22, category:"Makeup", brand:"GlowBeauty"},
  {id:9,name:"Eye Shadow Palette",price:35, category:"Makeup", brand:"PureSkin"},
  {id:10,name:"Cleansing Foam",price:19, category:"Skincare", brand:"LuxeCos"}
];

const catalogContainer = document.getElementById('catalog-products');

function renderProducts(list) {
  catalogContainer.innerHTML = '';
  list.forEach(p=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-image-placeholder"></div>
      <div class="card-content">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
        <button class="view-details" onclick="window.location.href='product.html?id=${p.id}'">View Details</button>
      </div>
    `;
    catalogContainer.appendChild(card);
  });
}

// Изначально показываем все товары
renderProducts(products);

// Функция добавления в корзину
function addToCart(id){
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let product = products.find(p => p.id === id);
  const existing = cart.find(item => item.id === id);
  if(existing){
    existing.quantity++;
  } else {
    cart.push({...product, quantity:1});
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  document.getElementById('cart-counter').textContent = cart.reduce((sum,item)=>sum+item.quantity,0);
}

// Очистка всех фильтров
document.getElementById('clear-filters').addEventListener('click', ()=>{
  document.querySelectorAll('.filter-checkbox').forEach(cb=>cb.checked = false);
  renderProducts(products); // показываем все товары
});

// Применение фильтров
document.getElementById('apply-filters').addEventListener('click', ()=>{
  const selectedValues = Array.from(document.querySelectorAll('.filter-checkbox'))
    .filter(cb => cb.checked)
    .map(cb => cb.value);

  const filtered = products.filter(p => {
    // Категории
    if(selectedValues.includes(p.category)) return true;
    // Бренды
    if(selectedValues.includes(p.brand)) return true;
    // Цены
    if(selectedValues.includes("10-20") && p.price>=10 && p.price<=20) return true;
    if(selectedValues.includes("21-50") && p.price>=21 && p.price<=50) return true;

    return false;
  });

  renderProducts(filtered);
});
</script>

</body>
</html>
