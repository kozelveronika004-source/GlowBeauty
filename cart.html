<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowBeauty - Cart</title>
<link rel="stylesheet" href="style.css">
<style>
/* Сделать body и html на всю высоту */
html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
  font-family: Arial, sans-serif;
}

/* Основной контейнер страницы */
.container {
  flex: 1; /* занимает всё доступное пространство */
  max-width: 900px;
  margin: 20px auto;
  padding: 0 10px;
}

/* Заголовки */
h2, h3 {
  margin: 10px 0;
}

/* Cart items */
#cart-items div {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 8px 10px;
  border-bottom: 1px solid #ddd;
  border-radius: 5px;
}

/* Buttons */
button {
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.proceed-checkout-btn {
  background-color: #ff66b2;
  color: white;
  padding: 10px 15px;
}

.clear-cart-btn {
  background-color: #ccc;
  color: #333;
  padding: 10px 15px;
}

/* Remove button */
.remove-btn {
  background-color: red;
  color: white;
  padding: 2px 8px;
}

/* Footer */
footer {
  background-color: #f5f5f5;
  text-align: center;
  padding: 15px 10px;
}
</style>
</head>
<body>

<header>
  <div class="logo">GlowBeauty</div>
  <nav class="nav-center">
    <a href="index.html">Home</a>
    <a href="catalog.html">Catalog</a>
    <a href="checkout.html">Checkout</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-wrapper">
    <a href="cart.html" class="cart-icon">🛒<span id="cart-counter">0</span></a>
  </div>
</header>

<main class="container">
  <h2>Your Cart</h2>

  <div id="cart-items"></div>
  <h3>Total: $<span id="cart-total">0</span></h3>

  <div style="margin-top:20px; display:flex; gap:10px;">
    <button class="proceed-checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
    <button class="clear-cart-btn" id="clear-cart">Clear Cart</button>
  </div>
</main>

<footer>
  <p>Contact: info@glowbeauty.com | Follow us on social media</p>
  <p>© 2026 GlowBeauty</p>
</footer>

<script>
// ====== Инициализация корзины ======
let cart = JSON.parse(localStorage.getItem('cart')) || [];

const cartItemsDiv = document.getElementById('cart-items');
const cartTotalSpan = document.getElementById('cart-total');
const cartCounter = document.getElementById('cart-counter');

// ====== Функция рендеринга корзины ======
function renderCart() {
  cartItemsDiv.innerHTML = '';
  if(cart.length === 0){
    cartItemsDiv.innerHTML = '<p>Your cart is empty.</p>';
  } else {
    cart.forEach(item => {
      const div = document.createElement('div');
      div.innerHTML = `
        <span>${item.name} ($${item.price}) x ${item.quantity}</span>
        <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
      `;
      cartItemsDiv.appendChild(div);
    });
  }

  const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
  cartTotalSpan.textContent = total;
  cartCounter.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
}

// ====== Удаление одного товара ======
function removeItem(id){
  cart = cart.filter(item => item.id !== id);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

// ====== Очистка корзины с подтверждением ======
document.getElementById('clear-cart').addEventListener('click', ()=>{
  const confirmClear = confirm('Are you sure you want to remove all items from the cart?');
  if(confirmClear){
    cart = [];
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }
});

// ====== Пример функции добавления товара для теста ======
function addToCart(id){
  let product = {id: id, name: 'Sample Product', price: 20, quantity:1};
  const existing = cart.find(item => item.id === id);
  if(existing){
    existing.quantity++;
  } else {
    cart.push(product);
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

// ====== Рендерим корзину при загрузке ======
renderCart();
</script>

</body>
</html>
