<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlowBeauty - Checkout</title>
<link rel="stylesheet" href="style.css">
<style>
/* Форма checkout */
.checkout-form {
  max-width: 600px;
  margin: 20px auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.checkout-form input {
  width: 100%;
  padding: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.checkout-form button {
  width: 180px;
  padding: 10px;
  border: none;
  border-radius: 5px;
  background-color: #ff66b2;
  color: white;
  cursor: pointer;
  align-self: center;
}

.checkout-form button:hover {
  background-color: #ff85c1;
}

.order-total {
  font-size: 18px;
  font-weight: bold;
  text-align: left; /* выравнивание слева */
  padding: 5px 0;
}
</style>
</head>
<body>

<header>
  <div class="logo">GlowBeauty</div>
  <nav class="nav-center">
    <a href="index.html">Home</a>
    <a href="catalog.html">Catalog</a>
    <a href="checkout.html" class="active">Checkout</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-wrapper">
    <a href="cart.html" class="cart-icon">🛒<span id="cart-counter">0</span></a>
  </div>
</header>

<main class="container">
  <h2>Checkout</h2>

  <form class="checkout-form" id="checkoutForm">
    <!-- Total слева -->
    <div class="order-total">
      Total: $<span id="total-amount">0</span>
    </div>

    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="address" placeholder="Shipping Address" required>
    <input type="tel" name="phone" placeholder="Phone" required>
    <button type="submit">Confirm Order</button>
  </form>

</main>

<footer>
  <p>Contact: info@glowbeauty.com | Follow us on social media</p>
  <p>© 2026 GlowBeauty</p>
</footer>

<script>
// Отображение общей суммы из корзины
function updateTotal() {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
  document.getElementById('total-amount').textContent = total.toFixed(2);
}
updateTotal();

// Обновление счетчика корзины в хедере
document.getElementById('cart-counter').textContent = (JSON.parse(localStorage.getItem('cart')) || [])
  .reduce((sum,item)=>sum+item.quantity,0);

// Обработка формы
document.getElementById('checkoutForm').addEventListener('submit', function(e){
  e.preventDefault();
  alert('Order Placed Successfully!');
  localStorage.removeItem('cart'); // очищаем корзину
  this.reset();
  updateTotal();
  document.getElementById('cart-counter').textContent = 0;
});
</script>

</body>
</html>
